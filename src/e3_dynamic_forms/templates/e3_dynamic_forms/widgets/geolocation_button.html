<div class="geolocation-widget">
    <input type="hidden" name="{{ widget.name }}" id="{{ widget.attrs.id }}" value="{{ widget.value }}" {% for key, val in widget.attrs.items %}{{ key }}="{{ val }}" {% endfor %}>
    <button type="button" class="btn btn-outline-secondary btn-sm geolocation-capture-btn" data-target="{{ widget.attrs.id }}">
        <span class="geolocation-icon">&#128205;</span> Capture Location
    </button>
    <span class="geolocation-display" id="{{ widget.attrs.id }}_display">
        {% if widget.value %}{{ widget.value }}{% endif %}
    </span>
</div>
